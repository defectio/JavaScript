        <script>
            var data = [
                {
                    id: 1,
                    name: 'kim',
                },
                {
                    id: 2,
                    name: 'lee',
                },
                {
                    id: 3,

                    name: 'park',
                },
                {
                    id: 4,
                    name: 'choi',
                },
            ];

            var groupA = [
                {
                    id: 5,
                    name: 'song',
                },
                {
                    id: 6,
                    name: 'jung',
                },
            ];

            // data 배열에 groupA 배열의 요소 추가
            for (var i = 0; i < groupA.length; i++) {
                data.push(groupA[i]);
            }

            console.log(data);

            // groupA 배열의 요소를 data 배열에서 제거
            for (var i = data.length - 1; i >= 0; i--) {
                for (var j = 0; j < groupA.length; j++) {
                    if (data[i].id === groupA[j].id) {
                        // arr.splice(i, 1); // index i부터 1개 삭제
                        data.splice(i, 1);
                        break;
                    }
                }
            }
