<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
    </head>
    <body>
        <script>
            var data = [
                {
                    id: 1,
                    name: 'kim',
                },
                {
                    id: 2,
                    name: 'lee',
                },
                {
                    id: 3,

                    name: 'park',
                },
                {
                    id: 4,
                    name: 'choi',
                },
            ];

            var groupA = [
                {
                    id: 5,
                    name: 'song',
                },
                {
                    id: 3,

                    name: 'park',
                },
                {
                    id: 6,
                    name: 'jung',
                },
            ];

            // data 배열에 groupA 배열의 요소 추가
            // for (var i = 0; i < groupA.length; i++) {
            //     data.push(groupA[i]);
            // }

            // 중복 요소를 제거 후 추가
            for (var i = 0; i < groupA.length; i++) {
                var isduplicate = false;

                for (var j = 0; j < data.length; j++) {
                    if (groupA[i].id === data[j].id) {
                        isduplicate = true;
                        break;
                    }
                }
                if (!isduplicate) {
                    data.push(groupA[i]);
                }
            }
            console.log('중복 제거 후 요소 추가 : ', data);

            // groupB 배열의 요소를 data 배열에서 제거
            for (var i = data.length - 1; i >= 0; i--) {
                for (var j = 0; j < groupA.length; j++) {
                    if (data[i].id === groupA[j].id) {
                        data.splice(i, 1); // index i부터 1개 삭제
                        break;
                    }
                }
            }
            console.log('groupB 배열의 요소 제거 : ', data);
        </script>
    </body>
</html>
