<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
    </head>
    <body>
        <script>
            // 배열(Array) : 여러 개의 값을 하나의 변수에 저장할 수 있는 자료구조
            // 배열에 요소 추가 : push() 메서드 사용
            var arr = [1, 2, 3, 4, 5];
            console.log(arr); // (5) [1, 2, 3, 4, 5]

            var result = arr.push(6);
            console.log(arr); // (6) [1, 2, 3, 4, 5, 6]
            console.log('resutl', result); // 6 : push() 메서드는 배열의 새로운 길이를 반환. 배열을 반환하지 않음

            // unshift 요소 추가
            arr.unshift(7);
            console.log(arr); // (7) [7, 1, 2, 3, 4, 5, 6]

            // spread : 원본 유지한 상태로 배열 요소 추가
            arr = [...arr, 8];
            console.log(arr); // (8) [7, 1, 2, 3, 4, 5, 6, 8]

            ////////////////////////

            // 배열에 배열 추가
            var arr1 = [1, 2, 3];
            var arr2 = [4, 5, 6];
            var arr3 = [7, 8, 9];

            // 에상 : [1, 2, 3, 4, 5, 6]
            // 실제 : [1, 2, 3, [4, 5, 6]] -> 배열 자체가 요소로 추가됨
            // arr1.push(arr2);
            console.log(arr1); // (4)  [1, 2, 3, Array(3)]

            for (var i = 0; i < arr2.length; i++) {
                arr1.push(arr2[i]);
            }
            console.log(arr1); // (6) [1, 2, 3, 4, 5, 6]

            var arr4 = [...arr2, ...arr3];
            console.log(arr4); // (6) [4, 5, 6, 7, 8, 9]
        </script>
    </body>
</html>
